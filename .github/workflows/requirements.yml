name: Валидация требований

on:
  push:
    paths:
      - 'requirements/**'
      - 'scripts/validate-requirements.js'
      - 'scripts/validate-docs-headings.js'
      - 'docs/**'
  pull_request:
    paths:
      - 'requirements/**'
      - 'scripts/validate-requirements.js'
      - 'scripts/validate-docs-headings.js'
      - 'docs/**'

jobs:
  validate:
    name: Валидация требований
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настройка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Валидация требований
        run: node scripts/validate-requirements.js

      - name: Валидация трассировки заголовков документации
        run: node scripts/validate-docs-headings.js
