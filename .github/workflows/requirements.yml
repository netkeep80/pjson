name: Валидация требований

on:
  push:
    paths:
      - 'requirements/**'
      - 'scripts/validate-requirements.js'
      - 'scripts/validate-repo-guard-workflow.js'
      - 'docs/**'
      - 'repo-policy.json'
      - '.github/workflows/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    paths:
      - 'requirements/**'
      - 'scripts/validate-requirements.js'
      - 'scripts/validate-repo-guard-workflow.js'
      - 'docs/**'
      - 'repo-policy.json'
      - '.github/workflows/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

permissions:
  contents: read

jobs:
  validate:
    name: Валидация требований
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настройка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Валидация требований
        run: node scripts/validate-requirements.js

      - name: Валидация repo-guard workflow
        run: node scripts/validate-repo-guard-workflow.js

      - name: Валидация repo-guard policy
        uses: netkeep80/repo-guard@88fdc275cbc9bd835cc20c638d83d832027182c7
        with:
          mode: check-diff
          enforcement: blocking
